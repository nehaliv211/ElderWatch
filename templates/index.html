<!DOCTYPE html>
<html>

<head>
    <title>ElderWatch</title>

    <style>
        body {
            font-family: Arial;
            background: #eef2f7;
            margin: 0;
        }

        header {
            background: #3498db;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h3 {
            margin-top: 0;
            color: #2c3e50;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: none;
            border-radius: 6px;
            background: #3498db;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }

        input {
            width: 95%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .sos-btn {
            background: red;
        }

        .sos-btn:hover {
            background: darkred;
        }
    </style>
</head>

<body>

    <header>
        👴 ElderWatch Monitoring System 👵
    </header>

    <div class="container">

        <!-- CHECK-IN -->
        <div class="card">
            <h3>Daily Check-In</h3>
            <button onclick="checkin('OK')">I'm OK</button>
            <button onclick="checkin('HELP')">Need Help</button>
        </div>

        <!-- SOS -->
        <div class="card">
            <h3>Emergency SOS</h3>
            <input id="location" placeholder="Enter Location">
            <button class="sos-btn" onclick="sendSOS()">Send SOS Alert</button>
        </div>

        <!-- MEDICINE -->
        <div class="card">
            <h3>Medicine Tracker</h3>
            <input id="mname" placeholder="Medicine Name">
            <input id="mdose" placeholder="Dosage">
            <input id="mtime" placeholder="Time">
            <button onclick="addMedicine()">Add Medicine</button>
        </div>

        <!-- CONTACT -->
        <div class="card">
            <h3>Emergency Contacts</h3>
            <input id="cname" placeholder="Name">
            <input id="crelation" placeholder="Relation">
            <input id="cphone" placeholder="Phone">
            <button onclick="addContact()">Add Contact</button>
        </div>

        <!-- LOCATION -->
        <div class="card">
            <h3>Location Tracker</h3>
            <input id="lat" placeholder="Latitude">
            <input id="long" placeholder="Longitude">
            <button onclick="sendLocation()">Update Location</button>
        </div>

    </div>

    <script>
        const URL = "http://127.0.0.1:5000";

        // CHECK-IN
        function checkin(status) {
            fetch(URL + "/checkin", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ status: status })
            })
                .then(res => res.json())
                .then(data => alert(data.message));
        }

        // SOS
        function sendSOS() {
            let loc = document.getElementById("location").value;

            fetch(URL + "/sos", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ location: loc })
            })
                .then(res => res.json())
                .then(data => alert(data.message));
        }

        // MEDICINE
        function addMedicine() {
            let name = document.getElementById("mname").value;
            let dosage = document.getElementById("mdose").value;
            let time = document.getElementById("mtime").value;

            fetch(URL + "/add_medicine", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, dosage, time })
            })
                .then(res => res.json())
                .then(data => alert(data.message));
        }

        // CONTACT
        function addContact() {
            let name = document.getElementById("cname").value;
            let relation = document.getElementById("crelation").value;
            let phone = document.getElementById("cphone").value;

            fetch(URL + "/add_contact", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, relation, phone })
            })
                .then(res => res.json())
                .then(data => alert(data.message));
        }

        // LOCATION
        function sendLocation() {
            let latitude = document.getElementById("lat").value;
            let longitude = document.getElementById("long").value;

            fetch(URL + "/location", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ latitude, longitude })
            })
                .then(res => res.json())
                .then(data => alert(data.message));
        }
    </script>

</body>

</html>
